name: build-node24

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-node24.yml"
      - "openwrt/**"
      - "scripts/**"
      - "README.md"
      - ".gitignore"

jobs:
  build:
    name: ${{ matrix.target.id }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - id: rockchip-armv8
            openwrt_target: rockchip
            openwrt_subtarget: armv8
            pkg_arch: aarch64_generic
            config_file: openwrt/configs/24.10/rockchip-armv8.config
          - id: x86-64
            openwrt_target: x86
            openwrt_subtarget: "64"
            pkg_arch: x86_64
            config_file: openwrt/configs/24.10/x86-64.config
          - id: x86-generic
            openwrt_target: x86
            openwrt_subtarget: generic
            pkg_arch: i386_pentium4
            config_file: openwrt/configs/24.10/x86-generic.config
          - id: bcm27xx-bcm2709
            openwrt_target: bcm27xx
            openwrt_subtarget: bcm2709
            pkg_arch: arm_cortex-a7_neon-vfpv4
            config_file: openwrt/configs/24.10/bcm27xx-bcm2709.config
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      OPENWRT_SERIES: "24.10"
      OPENWRT_BRANCH: openwrt-24.10
      OPENWRT_TARGET_ID: ${{ matrix.target.id }}
      OPENWRT_TARGET: ${{ matrix.target.openwrt_target }}
      OPENWRT_SUBTARGET: ${{ matrix.target.openwrt_subtarget }}
      OPENWRT_PKG_ARCH: ${{ matrix.target.pkg_arch }}
      PACKAGE_NAME: node24
      OPENWRT_SRC_DIR: ${{ github.workspace }}/work/openwrt-src
      OPENWRT_DL_DIR: ${{ github.workspace }}/work/dl
      CCACHE_DIR: ${{ github.workspace }}/work/.ccache
      CONFIG_FILE: ${{ github.workspace }}/${{ matrix.target.config_file }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Show build target
        run: |
          set -euo pipefail
          echo "Target ID: ${OPENWRT_TARGET_ID}"
          echo "OpenWrt target: ${OPENWRT_TARGET}/${OPENWRT_SUBTARGET}"
          echo "Package arch: ${OPENWRT_PKG_ARCH}"
          echo "Config file: ${CONFIG_FILE}"

      - name: Detect runner resources
        run: |
          set -euo pipefail
          cpu_jobs="$(nproc)"
          mem_gib="$(awk '/MemTotal/ {print int($2/1024/1024)}' /proc/meminfo)"
          build_jobs="$mem_gib"
          max_jobs="$(( cpu_jobs * 3 / 2 ))"

          if [ "$build_jobs" -gt "$max_jobs" ]; then
            build_jobs="$max_jobs"
          fi
          if [ "$build_jobs" -lt 4 ]; then
            build_jobs=4
          fi

          echo "BUILD_JOBS=$build_jobs" >> "$GITHUB_ENV"

          echo "Runner CPU cores: $cpu_jobs"
          echo "Runner memory: ${mem_gib} GiB"
          echo "Computed BUILD_JOBS: $build_jobs"
          echo
          echo "== uname =="
          uname -a
          echo
          echo "== CPU =="
          nproc
          echo
          echo "== memory =="
          free -h
          echo
          echo "== meminfo =="
          grep -E 'MemTotal|MemAvailable|SwapTotal|SwapFree' /proc/meminfo
          echo
          echo "== disk =="
          df -h
          echo
          echo "== loadavg =="
          cat /proc/loadavg

      - name: Restore download cache
        uses: actions/cache@v5
        with:
          path: ${{ env.OPENWRT_DL_DIR }}
          key: ${{ runner.os }}-openwrt-dl-${{ env.OPENWRT_BRANCH }}-${{ matrix.target.id }}-${{ hashFiles('openwrt/package/lang/node24/Makefile', 'openwrt/package/lang/node24/patches/**', 'openwrt/configs/24.10/**', 'scripts/prepare_openwrt.sh') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-dl-${{ env.OPENWRT_BRANCH }}-${{ matrix.target.id }}-
            ${{ runner.os }}-openwrt-dl-${{ env.OPENWRT_BRANCH }}-

      - name: Restore ccache
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-openwrt-ccache-${{ env.OPENWRT_BRANCH }}-${{ matrix.target.id }}-${{ hashFiles('openwrt/package/lang/node24/Makefile', 'openwrt/package/lang/node24/patches/**', 'openwrt/configs/24.10/**') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-ccache-${{ env.OPENWRT_BRANCH }}-${{ matrix.target.id }}-
            ${{ runner.os }}-openwrt-ccache-${{ env.OPENWRT_BRANCH }}-

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential ccache cmake cpio curl device-tree-compiler flex \
            gawk gcc-multilib g++-multilib gettext genisoimage git gperf \
            haveged help2man intltool libelf-dev libfuse-dev libglib2.0-dev \
            libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev \
            libpython3-dev libreadline-dev libssl-dev libtool lld msmtp \
            ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip \
            python3-ply python3-docutils python3-pyelftools python3-setuptools \
            qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs \
            upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
          mkdir -p "${OPENWRT_DL_DIR}" "${CCACHE_DIR}"
          ccache --max-size 2G

      - name: Prepare OpenWrt source tree
        run: ./scripts/prepare_openwrt.sh

      - name: Show OpenWrt config summary
        run: |
          set -euo pipefail
          grep -E "^(CONFIG_TARGET_|CONFIG_PACKAGE_${PACKAGE_NAME}|CONFIG_NODE24_ICU_)" "${OPENWRT_SRC_DIR}/.config" | sort

      - name: Download OpenWrt sources
        working-directory: ${{ env.OPENWRT_SRC_DIR }}
        run: make -j1 download V=s

      - name: Build OpenWrt tools
        working-directory: ${{ env.OPENWRT_SRC_DIR }}
        run: FORCE_UNSAFE_CONFIGURE=1 make -j"${BUILD_JOBS}" tools/install V=s

      - name: Build OpenWrt toolchain
        working-directory: ${{ env.OPENWRT_SRC_DIR }}
        run: FORCE_UNSAFE_CONFIGURE=1 make -j"${BUILD_JOBS}" toolchain/install V=s

      - name: Prepare node24
        working-directory: ${{ env.OPENWRT_SRC_DIR }}
        run: make -j"${BUILD_JOBS}" package/lang/${PACKAGE_NAME}/prepare V=s

      - name: Compile node24
        working-directory: ${{ env.OPENWRT_SRC_DIR }}
        run: make -j"${BUILD_JOBS}" package/lang/${PACKAGE_NAME}/compile V=s

      - name: Show built package sizes
        run: |
          set -euo pipefail
          ls -lh \
            "${OPENWRT_SRC_DIR}/bin/packages/${OPENWRT_PKG_ARCH}/base/${PACKAGE_NAME}_"*.ipk \
            "${OPENWRT_SRC_DIR}/bin/packages/${OPENWRT_PKG_ARCH}/base/${PACKAGE_NAME}-npm_"*.ipk

      - name: Upload ipk artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.PACKAGE_NAME }}-ipk-${{ env.OPENWRT_TARGET_ID }}-${{ env.OPENWRT_PKG_ARCH }}
          path: |
            ${{ env.OPENWRT_SRC_DIR }}/bin/packages/${{ env.OPENWRT_PKG_ARCH }}/base/${{ env.PACKAGE_NAME }}_*.ipk
            ${{ env.OPENWRT_SRC_DIR }}/bin/packages/${{ env.OPENWRT_PKG_ARCH }}/base/${{ env.PACKAGE_NAME }}-npm_*.ipk
